name: PR Quality Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "package.json:      $PKG_VERSION"
          echo "tauri.conf.json:   $TAURI_VERSION"
          echo "Cargo.toml:        $CARGO_VERSION"
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ] || [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! All three files must have the same version."
            exit 1
          fi
          echo "All versions match: $PKG_VERSION"

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests with coverage
        run: pnpm exec vitest run --coverage
      - name: Build frontend
        run: pnpm build

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create placeholders for Tauri build script
        run: |
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          mkdir -p dist
      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
