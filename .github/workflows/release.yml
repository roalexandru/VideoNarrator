name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm exec vitest run
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create placeholders for Tauri build script
        run: |
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          mkdir -p dist
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-and-release:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            friendly: macOS-Apple-Silicon
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            friendly: macOS-Intel
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            friendly: Windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download ffmpeg for Windows
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          7z x ffmpeg.zip -offmpeg-extracted
          FFMPEG_DIR=$(find ffmpeg-extracted -name "ffmpeg.exe" -printf "%h\n" | head -1)
          cp "$FFMPEG_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp "$FFMPEG_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Narrator ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Narrator-<version>-macOS-Apple-Silicon.dmg` |
            | macOS (Intel) | `Narrator-<version>-macOS-Intel.dmg` |
            | Windows | `Narrator-<version>-Windows-x64-setup.exe` |

            > **macOS note:** The app is not code-signed. After installing, run `sudo xattr -rd com.apple.quarantine /Applications/Narrator.app` in Terminal.

            ## What's New
            _Edit this section before publishing._
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action has a bug with --target: it generates .sig files but can't
      # find them for latest.json. Upload .sig files manually as a workaround.
      - name: Upload signature and update bundle files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.rust-target }}"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"

          echo "Looking for .sig files in $BUNDLE_DIR"
          ls -laR "$BUNDLE_DIR" | grep -E '\.(sig|nsis\.zip|msi\.zip)$' || echo "No matching files found"

          # Collect all files to upload (sig, nsis.zip, msi.zip)
          FILES=$(find "$BUNDLE_DIR" -type f \( -name "*.sig" -o -name "*.nsis.zip" -o -name "*.msi.zip" \) 2>/dev/null)

          if [ -z "$FILES" ]; then
            echo "No signature or update bundle files found — skipping"
            exit 0
          fi

          echo "$FILES" | while IFS= read -r FILE; do
            echo "Uploading: $(basename "$FILE")"
            gh release upload "$TAG" "$FILE" --clobber
          done

  # Generate latest.json after all platform builds complete
  publish-updater:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          ASSETS=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --paginate)
          NOTES=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID" --jq '.body // ""')
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Helper: get download URL for an asset by name suffix
          get_url() { echo "$ASSETS" | jq -r ".[] | select(.name | endswith(\"$1\")) | .browser_download_url" | head -1; }
          # Helper: get signature content from a .sig asset
          get_sig() {
            local SIG_URL=$(get_url "$1")
            if [ -n "$SIG_URL" ] && [ "$SIG_URL" != "null" ]; then
              curl -sL "$SIG_URL"
            else
              echo ""
            fi
          }

          # Get signatures
          MAC_AARCH64_SIG=$(get_sig ".app.tar.gz.sig" | head -1)
          # If there's only one .app.tar.gz.sig, both arches might share it
          # Try to find arch-specific ones first
          MAC_AARCH64_URL=$(get_url "_aarch64.app.tar.gz")
          MAC_X64_URL=$(get_url "_x64.app.tar.gz")

          # For macOS, sig files match the tar.gz names
          MAC_AARCH64_SIG_URL=$(get_url "aarch64.app.tar.gz.sig")
          MAC_X64_SIG_URL=$(get_url "x64.app.tar.gz.sig")

          MAC_AARCH64_SIG=""
          if [ -n "$MAC_AARCH64_SIG_URL" ] && [ "$MAC_AARCH64_SIG_URL" != "null" ]; then
            MAC_AARCH64_SIG=$(curl -sL "$MAC_AARCH64_SIG_URL")
          fi
          MAC_X64_SIG=""
          if [ -n "$MAC_X64_SIG_URL" ] && [ "$MAC_X64_SIG_URL" != "null" ]; then
            MAC_X64_SIG=$(curl -sL "$MAC_X64_SIG_URL")
          fi

          # Windows NSIS
          WIN_NSIS_URL=$(get_url ".nsis.zip")
          WIN_NSIS_SIG_URL=$(get_url ".nsis.zip.sig")
          WIN_NSIS_SIG=""
          if [ -n "$WIN_NSIS_SIG_URL" ] && [ "$WIN_NSIS_SIG_URL" != "null" ]; then
            WIN_NSIS_SIG=$(curl -sL "$WIN_NSIS_SIG_URL")
          fi

          cat > /tmp/latest.json << EJSON
          {
            "version": "$VERSION",
            "notes": "",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_AARCH64_SIG",
                "url": "$MAC_AARCH64_URL"
              },
              "darwin-x86_64": {
                "signature": "$MAC_X64_SIG",
                "url": "$MAC_X64_URL"
              },
              "windows-x86_64": {
                "signature": "$WIN_NSIS_SIG",
                "url": "$WIN_NSIS_URL"
              }
            }
          }
          EJSON

          echo "Generated latest.json:"
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --clobber

