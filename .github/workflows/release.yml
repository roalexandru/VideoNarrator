name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm exec vitest run
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create placeholders for Tauri build script
        run: |
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          mkdir -p dist
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-and-release:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download ffmpeg for Windows
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          7z x ffmpeg.zip -offmpeg-extracted
          FFMPEG_DIR=$(find ffmpeg-extracted -name "ffmpeg.exe" -printf "%h\n" | head -1)
          cp "$FFMPEG_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp "$FFMPEG_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Narrator ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download and install Narrator.

            ## What's New
            _Edit this section before publishing._
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
