name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm exec vitest run
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create placeholders for Tauri build script
        run: |
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          mkdir -p dist
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-and-release:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            friendly: macOS-Apple-Silicon
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            friendly: macOS-Intel
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            friendly: Windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      # Exclude build paths and toolchain processes from Defender. On Windows
      # runners this typically saves 20-30% of build I/O. Best-effort: a
      # failure here should not fail the build.
      - name: Tune Windows Defender for build paths
        if: matrix.platform == 'windows-latest'
        continue-on-error: true
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\src-tauri\target"
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\node_modules"
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\website\node_modules"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.rustup"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\pnpm"
          Add-MpPreference -ExclusionProcess "rustc.exe"
          Add-MpPreference -ExclusionProcess "cargo.exe"
          Add-MpPreference -ExclusionProcess "link.exe"
          Add-MpPreference -ExclusionProcess "lld-link.exe"
          Add-MpPreference -ExclusionProcess "node.exe"
          Add-MpPreference -ExclusionProcess "pnpm.exe"

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch ffmpeg sidecars (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          case "${{ matrix.rust-target }}" in
            aarch64-apple-darwin) ./scripts/fetch-ffmpeg.sh macos-arm ;;
            x86_64-apple-darwin)  ./scripts/fetch-ffmpeg.sh macos-intel ;;
          esac

      - name: Fetch ffmpeg sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: ./scripts/fetch-ffmpeg.sh windows

      - uses: tauri-apps/tauri-action@v0.6.2
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Narrator ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Narrator-<version>-macOS-Apple-Silicon.dmg` |
            | macOS (Intel) | `Narrator-<version>-macOS-Intel.dmg` |
            | Windows | `Narrator-<version>-Windows-x64-setup.exe` |

            > **macOS note:** The app is not code-signed. After installing, run `sudo xattr -rd com.apple.quarantine /Applications/Narrator.app` in Terminal.

            ## What's New
            _Edit this section before publishing._
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}


