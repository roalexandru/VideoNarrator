name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm exec vitest run
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Create placeholders for Tauri build script
        run: |
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          mkdir -p dist
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build-and-release:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            friendly: macOS-Apple-Silicon
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            friendly: macOS-Intel
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            friendly: Windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download ffmpeg for Windows
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          7z x ffmpeg.zip -offmpeg-extracted
          FFMPEG_DIR=$(find ffmpeg-extracted -name "ffmpeg.exe" -printf "%h\n" | head -1)
          cp "$FFMPEG_DIR/ffmpeg.exe" src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          cp "$FFMPEG_DIR/ffprobe.exe" src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Narrator ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Narrator-<version>-macOS-Apple-Silicon.dmg` |
            | macOS (Intel) | `Narrator-<version>-macOS-Intel.dmg` |
            | Windows | `Narrator-<version>-Windows-x64-setup.exe` |

            > **macOS note:** The app is not code-signed. After installing, run `sudo xattr -rd com.apple.quarantine /Applications/Narrator.app` in Terminal.

            ## What's New
            _Edit this section before publishing._
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename artifacts with friendly names
        if: matrix.platform != 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Map rust target to the asset name pattern Tauri uses
          case "${{ matrix.rust-target }}" in
            aarch64-apple-darwin) PATTERN="aarch64.dmg" ; NEW_NAME="Narrator-${VERSION}-macOS-Apple-Silicon.dmg" ;;
            x86_64-apple-darwin)  PATTERN="x64.dmg"     ; NEW_NAME="Narrator-${VERSION}-macOS-Intel.dmg" ;;
            *) echo "No rename needed for ${{ matrix.rust-target }}"; exit 0 ;;
          esac

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')

          ASSET=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            --paginate --jq ".[] | select(.name | endswith(\"$PATTERN\")) | \"\(.id) \(.name)\"")

          if [ -z "$ASSET" ]; then
            echo "No asset matching *${PATTERN} found yet — skipping rename"
            exit 0
          fi

          ASSET_ID=$(echo "$ASSET" | awk '{print $1}')
          CURRENT_NAME=$(echo "$ASSET" | awk '{print $2}')

          if [ "$CURRENT_NAME" != "$NEW_NAME" ]; then
            echo "Renaming: $CURRENT_NAME -> $NEW_NAME"
            gh api --method PATCH "repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
              -f name="$NEW_NAME" --silent
          fi

      - name: Rename artifacts with friendly names
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')

          for PAIR in "x64-setup.exe:Narrator-${VERSION}-Windows-x64-setup.exe" "x64_en-US.msi:Narrator-${VERSION}-Windows-x64.msi"; do
            PATTERN="${PAIR%%:*}"
            NEW_NAME="${PAIR#*:}"

            ASSET=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
              --paginate --jq ".[] | select(.name | endswith(\"$PATTERN\")) | \"\(.id) \(.name)\"")

            if [ -z "$ASSET" ]; then
              echo "No asset matching *${PATTERN} — skipping"
              continue
            fi

            ASSET_ID=$(echo "$ASSET" | awk '{print $1}')
            CURRENT_NAME=$(echo "$ASSET" | awk '{print $2}')

            if [ "$CURRENT_NAME" != "$NEW_NAME" ]; then
              echo "Renaming: $CURRENT_NAME -> $NEW_NAME"
              gh api --method PATCH "repos/${{ github.repository }}/releases/assets/$ASSET_ID" \
                -f name="$NEW_NAME" --silent
            fi
          done
